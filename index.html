<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SIGNA IDE - Clean Version</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #0d0d0d; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a1a1a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ffcc00; }
        .container { display: flex; flex: 1; }
        textarea { flex: 1; background: #121212; color: #ffcc00; border: none; padding: 25px; font-size: 18px; outline: none; resize: none; border-right: 2px solid #333; line-height: 1.5; }
        .output-container { flex: 1; display: flex; flex-direction: column; background: #050505; }
        .output { flex: 1; padding: 25px; overflow-y: auto; color: #00ffcc; font-size: 19px; }
        .vol2-area { padding: 15px; background: #111; color: #666; border-top: 1px solid #333; min-height: 40px; }
        .btns { display: flex; gap: 10px; }
        button { background: #ffcc00; color: #000; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #fff; }
        .line { margin: 8px 0; border-left: 4px solid #ffcc00; padding-left: 12px; }
    </style>
</head>
<body>

    <header>
        <div>⚡ <strong>SIGNA CORE</strong></div>
        <div class="btns">
            <button onclick="executarSigna()">EXECUTAR</button>
            <button onclick="salvarArquivo('.sig')">SALVAR SCRIPT (.sig)</button>
        </div>
    </header>

    <div class="container">
        <textarea id="editor" spellcheck="false">@void main #
    *flent 'Sistema SIGNA Limpo'* 
    &oi = oi&
    *flent 'se prepare:'*
    $oi$
# <vol 1>
<vol 2></textarea>

        <div class="output-container">
            <div id="terminal" class="output"></div>
            <div id="explicacao" class="vol2-area">...</div>
        </div>
    </div>

    <script>
        function salvarArquivo(extensao) {
            const texto = document.getElementById('editor').value;
            const blob = new Blob([texto], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "projeto" + extensao;
            a.click();
        }

        function executarSigna() {
            const terminal = document.getElementById('terminal');
            const explicacaoArea = document.getElementById('explicacao');
            terminal.innerHTML = ""; 
            let codigoFonte = document.getElementById('editor').value;
            
            try {
                const blocoHashMatch = codigoFonte.match(/#([\s\S]*?)#/);
                if (!blocoHashMatch) throw "Erro: # # ausente";
                const blocoHash = blocoHashMatch[1];
                
                const vol2Match = codigoFonte.match(/<vol 2>([\s\S]*)/);
                explicacaoArea.innerText = (vol2Match && vol2Match[1]) ? vol2Match[1].trim() : "";
                
                let variaveis = {};
                let linhas = blocoHash.split('\n');

                linhas.forEach(linha => {
                    linha = linha.trim();
                    if (!linha || linha.startsWith('!!')) return;

                    // --- APENAS FLENT ---
                    if (linha.startsWith('*flent') && linha.endsWith('*')) {
                        let msgMatch = linha.match(/'(.*?)'/);
                        if (msgMatch) terminal.innerHTML += `<div class="line">${msgMatch[1]}</div>`;
                    }

                    // --- APENAS VARIÁVEIS & ---
                    if (linha.startsWith('&') && linha.endsWith('&')) {
                        let conteudo = linha.slice(1, -1);
                        let [nome, ...resto] = conteudo.split('=');
                        if (nome && resto.length > 0) {
                            variaveis[nome.trim()] = resto.join('=').trim();
                        }
                    }

                    // --- APENAS EXIBIR $ ---
                    if (linha.startsWith('$') && linha.endsWith('$')) {
                        let varNome = linha.slice(1, -1).trim();
                        terminal.innerHTML += `<div class="line" style="color:#ffcc00">${variaveis[varNome] || ''}</div>`;
                    }
                });
            } catch (e) {
                terminal.innerHTML = `<div style="color: #ff4444;">❌ ${e}</div>`;
            }
        }
    </script>
</body>
</html>
